<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed – NetSocial</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="feed-page">
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">NetSocial</a>
      <nav id="nav-auth">
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="btn btn-secondary btn-sm">Log out</button>
      </nav>
    </div>
  </header>

  <main class="feed-main">
    <div class="container feed-layout">
      <!-- Compose -->
      <section class="compose-card" id="compose-section">
        <form id="post-form">
          <textarea id="post-content" name="content" maxlength="500"
                    placeholder="What's on your mind?" rows="3"></textarea>
          <div class="compose-footer">
            <span id="char-count" class="char-count">500</span>
            <button type="submit" class="btn btn-primary">Post</button>
          </div>
          <div id="post-error" class="alert alert-error hidden"></div>
        </form>
      </section>

      <!-- Feed -->
      <section class="posts-list" id="posts-list">
        <p class="loading-msg">Loading posts…</p>
      </section>
    </div>
  </main>

  <script>
    let currentUser = null;

    function getCsrfToken() {
      const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      return match ? decodeURIComponent(match[1]) : '';
    }

    async function init() {
      // Check auth
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) {
          window.location.href = '/login';
          return;
        }
        currentUser = await res.json();
        document.getElementById('user-name').textContent = currentUser.name;
      } catch {
        window.location.href = '/login';
        return;
      }

      loadPosts();
    }

    async function loadPosts() {
      try {
        const res = await fetch('/api/posts');
        const posts = await res.json();
        renderPosts(posts);
      } catch {
        document.getElementById('posts-list').innerHTML =
          '<p class="error-msg">Could not load posts.</p>';
      }
    }

    function renderPosts(posts) {
      const list = document.getElementById('posts-list');
      if (posts.length === 0) {
        list.innerHTML = '<p class="empty-msg">No posts yet. Be the first to post!</p>';
        return;
      }
      list.innerHTML = posts
        .map(
          (p) => `
          <article class="post-card" data-id="${p.id}">
            <div class="post-header">
              <span class="post-author">${escapeHtml(p.author)}</span>
              <span class="post-date">${formatDate(p.created_at)}</span>
              ${
                currentUser && p.user_id === currentUser.id
                  ? `<button class="btn-delete" data-id="${p.id}" title="Delete post">✕</button>`
                  : ''
              }
            </div>
            <p class="post-content">${escapeHtml(p.content)}</p>
          </article>`
        )
        .join('');

      list.querySelectorAll('.btn-delete').forEach((btn) => {
        btn.addEventListener('click', () => deletePost(btn.dataset.id));
      });
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const res = await fetch(`/api/posts/${id}`, {
        method: 'DELETE',
        headers: { 'X-CSRF-Token': getCsrfToken() },
      });
      if (res.ok) loadPosts();
    }

    // Compose form
    const textarea = document.getElementById('post-content');
    const charCount = document.getElementById('char-count');
    textarea.addEventListener('input', () => {
      charCount.textContent = 500 - textarea.value.length;
    });

    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('post-error');
      errorEl.classList.add('hidden');

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
          body: JSON.stringify({ content: textarea.value }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Could not post';
          errorEl.classList.remove('hidden');
          return;
        }
        textarea.value = '';
        charCount.textContent = '500';
        loadPosts();
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.remove('hidden');
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', headers: { 'X-CSRF-Token': getCsrfToken() } });
      window.location.href = '/login';
    });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString('nb-NO', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    init();
  </script>
</body>
</html>
