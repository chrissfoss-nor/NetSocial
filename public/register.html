<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – NetSocial</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">NetSocial</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="auth-subtitle">You need a <strong>@stud.___.no</strong> email to register.</p>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required placeholder="Ola Nordmann" />
        </div>
        <div class="form-group">
          <label for="email">Student email</label>
          <input type="email" id="email" name="email" required
                 placeholder="ola@stud.ntnu.no" />
          <span class="hint">Must end with <code>@stud.___.no</code></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required
                 minlength="8" placeholder="At least 8 characters" />
        </div>

        <div id="error-msg" class="alert alert-error hidden"></div>

        <button type="submit" class="btn btn-primary btn-block">Sign up</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </main>

  <script>
    function getCsrfToken() {
      const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      return match ? decodeURIComponent(match[1]) : '';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.add('hidden');

      const body = {
        name: e.target.name.value,
        email: e.target.email.value,
        password: e.target.password.value,
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Registration failed';
          errorEl.classList.remove('hidden');
          return;
        }
        window.location.href = '/feed';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
